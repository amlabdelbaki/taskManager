<h2 mat-dialog-title class="task-dialog__title">{{ dialogTitle() }}</h2>

<mat-dialog-content class="task-dialog__content">
  <form class="task-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="task-form__field">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" />
      <mat-error *ngIf="form.controls.title.hasError('required')">Title is required.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="task-form__field">
      <mat-label>Description</mat-label>
      <textarea matInput rows="4" formControlName="description"></textarea>
    </mat-form-field>

    <div class="task-form__row">
      <mat-form-field appearance="outline" class="task-form__field">
        <mat-label>Priority</mat-label>
        <mat-select formControlName="priority">
          <mat-option *ngFor="let priority of priorities" [value]="priority.value">
            {{ priority.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="task-form__field">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option *ngFor="let status of statuses" [value]="status.value">
            {{ status.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="task-form__row">
      <mat-form-field appearance="outline" class="task-form__field">
        <mat-label>Due date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="dueDate" />
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="task-form__field">
        <mat-label>Assignee</mat-label>
        <input matInput formControlName="assignee" />
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="task-dialog__actions">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid" (click)="onSubmit()">
    {{ submitLabel()}}
  </button>
</mat-dialog-actions>
