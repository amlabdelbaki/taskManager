<section class="toolbar">
  <mat-tab-group class="status-tabs" (selectedIndexChange)="onTabChange($event)">
    <mat-tab label="All"></mat-tab>
    <mat-tab label="To Do"></mat-tab>
    <mat-tab label="In Progress"></mat-tab>
    <mat-tab label="Done"></mat-tab>
  </mat-tab-group>

  <div class="actions">
    <mat-form-field class="priority-field" appearance="outline">
      <mat-label>Priority</mat-label>
      <mat-select
        [(ngModel)]="selectedPriority"
        (selectionChange)="onPriorityChange($event.value)"
      >
        <mat-option value="all">All</mat-option>
        <mat-option value="high">High</mat-option>
        <mat-option value="medium">Medium</mat-option>
        <mat-option value="low">Low</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-flat-button class="add-btn" type="button" (click)="onAddClick()">
      + New Task
    </button>
  </div>
</section>
