@if (task; as t) {
  <mat-card  [class]="'task-card' + ' ' + 'card-' + t.priority" >
    <div class="head">
      <span  [class]="'priority ' + t.priority">
        {{ t.priority }}
      </span>

      <button
        type="button"
        mat-icon-button
        class="menu-btn"
        aria-label="Task options"
        [matMenuTriggerFor]="taskMenu"
        (click)="stopEvent($event)">
        <mat-icon>more_vert</mat-icon>
      </button>
    </div>

    <h4 class="title">{{ t.title }}</h4>
    <p class="desc">{{ t.description }}</p>

    <div class="meta">
      <div class="due" [class.overdue]="t.isOverdue">
        <mat-icon>{{ t.isOverdue ? 'warning' : 'event' }}</mat-icon>
        <span>{{ t.isOverdue ? 'Overdue' : 'Due' }} {{ t.dueDate }}</span>
      </div>
      @if (t.tags.length > 0) {
        <span class="tag">{{ t.tags[0] }}</span>
      }
    </div>

    <div class="footer">
      <span class="avatar">
        {{ t.assignee.name.charAt(0) }}
      </span>
      <span class="name">{{ t.assignee.name }}</span>
    </div>
  </mat-card>

  <mat-menu #taskMenu="matMenu" panelClass="task-card-menu">
    <button mat-menu-item type="button" class="task-card-menu__item" (click)="onEdit($event)">
      <mat-icon>edit</mat-icon>
      <span>Edit</span>
    </button>
    <button mat-menu-item type="button" class="task-card-menu__item">
      <mat-icon>delete</mat-icon>
      <span>Delete</span>
    </button>
  </mat-menu>
}
