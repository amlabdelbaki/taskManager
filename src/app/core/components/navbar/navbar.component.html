<mat-toolbar class="navbar">
  <div class="navbar-brand">
    <button type="button" class="logo" (click)="onLogoClick()" aria-label="Toggle sidebar">
      <span class="logo-mark" aria-hidden="true">
        <mat-icon>description</mat-icon>
      </span>
      <span class="logo-text">Task Manager</span>
    </button>
  </div>

  <div class="navbar-search">
    <div class="search">
      <mat-icon class="search-icon">search</mat-icon>
      <input type="search" placeholder="Search tasks..." autocomplete="off" (input)="onSearch($event)" />
    </div>
  </div>

 <!-- Notification -->
  <div class="navbar-actions">
    <button type="button" mat-icon-button class="notification-btn" aria-label="Notifications">
      <mat-icon>notifications</mat-icon>
    </button>
    <div class="avatar" aria-hidden="true">JD</div>
  </div>
</mat-toolbar>
